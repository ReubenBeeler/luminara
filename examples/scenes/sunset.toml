# Sunset scene — warm golden hour lighting

[render]
width = 960
height = 540
samples = 128
max_depth = 50
background = { type = "sunset" }

[camera]
look_from = [4.0, 2.0, 8.0]
look_at = [0.0, 0.5, 0.0]
vfov = 35.0
aperture = 0.08
focus_dist = 10.0

# Reflective ground
[[plane]]
point = [0.0, 0.0, 0.0]
normal = [0.0, 1.0, 0.0]
material = { type = "checker", color1 = [0.6, 0.5, 0.4], color2 = [0.3, 0.25, 0.2], scale = 1.0 }

# Chrome sphere — catches the sunset
[[sphere]]
center = [0.0, 1.0, 0.0]
radius = 1.0
material = { type = "mirror" }

# Glass sphere with warm tint
[[sphere]]
center = [-2.0, 0.7, 1.0]
radius = 0.7
material = { type = "dielectric", refraction_index = 1.5, tint = [1.0, 0.9, 0.7] }

# Wooden torus
[[torus]]
center = [2.5, 0.3, 1.5]
major_radius = 0.5
minor_radius = 0.15
material = { type = "wood", color1 = [0.55, 0.3, 0.12], color2 = [0.3, 0.15, 0.08], scale = 6.0 }

# Marble pedestal
[[cylinder]]
center = [0.0, 0.0, 0.0]
radius = 0.3
height = 0.05
material = { type = "marble", color = [0.9, 0.88, 0.85], scale = 8.0 }

# Small gold spheres
[[sphere]]
center = [1.5, 0.25, 2.5]
radius = 0.25
material = { type = "metal", color = [0.9, 0.75, 0.3], fuzz = 0.05 }

[[sphere]]
center = [-1.0, 0.2, 3.0]
radius = 0.2
material = { type = "metal", color = [0.95, 0.8, 0.4], fuzz = 0.1 }
