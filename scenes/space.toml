# Space scene with starfield background
# Floating objects in deep space with blackbody stars and iridescent objects

[render]
width = 800
height = 450
samples = 64
max_depth = 50
seed = 42
bloom = 0.15

[render.background]
type = "starfield"
star_density = 1.5
star_brightness = 8.0

[camera]
look_from = [5.0, 2.0, 8.0]
look_at = [0.0, 0.0, 0.0]
vfov = 40.0
aperture = 0.0
focus_dist = 10.0

# Planet-like sphere with iridescent atmosphere
[[sphere]]
center = [0.0, 0.0, 0.0]
radius = 1.5
[sphere.material]
type = "iridescent"
color = [0.3, 0.5, 0.8]
thickness = 500
film_ior = 1.3
roughness = 0.15

# Crystal sphere
[[sphere]]
center = [3.0, 0.5, -1.0]
radius = 0.8
[sphere.material]
type = "dielectric"
refraction_index = 2.0
tint = [0.9, 0.7, 1.0]

# Gold asteroid ring
[[torus]]
center = [-2.0, 0.0, 1.0]
major_radius = 0.8
minor_radius = 0.25
[torus.material]
type = "anisotropic"
color = [0.85, 0.65, 0.2]
roughness_u = 0.05
roughness_v = 0.4

# Hot blue star (blackbody at 10000K)
[[sphere]]
center = [-3.0, 3.0, -5.0]
radius = 0.5
[sphere.material]
type = "blackbody"
temperature = 10000
intensity = 20.0

# Warm red dwarf star (blackbody at 3000K)
[[sphere]]
center = [6.0, -1.0, -8.0]
radius = 0.3
[sphere.material]
type = "blackbody"
temperature = 3000
intensity = 15.0

# Another fill light
[[light]]
position = [5.0, 5.0, 5.0]
color = [0.7, 0.8, 1.0]
intensity = 15.0
radius = 0.3

# Translucent nebula gas cloud
[[sphere]]
center = [-1.0, 1.5, -2.0]
radius = 0.6
[sphere.material]
type = "translucent"
color = [0.6, 0.2, 0.8]
translucency = 0.7
scatter_width = 0.9
