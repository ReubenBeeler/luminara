# Space scene with starfield background
# Floating objects in deep space

[render]
width = 800
height = 450
samples = 64
max_depth = 50
seed = 42

[render.background]
type = "starfield"
star_density = 1.5
star_brightness = 8.0

[camera]
look_from = [5.0, 2.0, 8.0]
look_at = [0.0, 0.0, 0.0]
vfov = 40.0
aperture = 0.0
focus_dist = 10.0

# Planet-like sphere
[[sphere]]
center = [0.0, 0.0, 0.0]
radius = 1.5
[sphere.material]
type = "voronoi"
color1 = [0.3, 0.5, 0.8]
color2 = [0.1, 0.2, 0.4]
scale = 0.3

# Crystal sphere
[[sphere]]
center = [3.0, 0.5, -1.0]
radius = 0.8
[sphere.material]
type = "dielectric"
refraction_index = 2.0
tint = [0.9, 0.7, 1.0]

# Gold asteroid
[[torus]]
center = [-2.0, 0.0, 1.0]
major_radius = 0.8
minor_radius = 0.25
[torus.material]
type = "metal"
color = [0.85, 0.65, 0.2]
fuzz = 0.3

# Emissive star
[[sphere]]
center = [-3.0, 3.0, -5.0]
radius = 0.5
[sphere.material]
type = "emissive"
color = [1.0, 0.9, 0.7]
intensity = 20.0

# Another emissive for fill
[[light]]
position = [5.0, 5.0, 5.0]
color = [0.7, 0.8, 1.0]
intensity = 15.0
radius = 0.3
