# Cornell Box — classic global illumination test scene
# Uses axis-aligned rectangles for walls and area light

[render]
width = 600
height = 600
samples = 256
max_depth = 50
background = { type = "black" }

[camera]
look_from = [278.0, 278.0, -800.0]
look_at = [278.0, 278.0, 0.0]
vfov = 40.0
aperture = 0.0
focus_dist = 1.0

# Area light (XZ rectangle on ceiling)
[[rect_xz]]
x = [213.0, 343.0]
z = [227.0, 332.0]
k = 554.0
material = { type = "emissive", color = [1.0, 0.95, 0.85], intensity = 15.0 }

# Floor (XZ at y=0)
[[rect_xz]]
x = [0.0, 555.0]
z = [0.0, 555.0]
k = 0.0
material = { type = "lambertian", color = [0.73, 0.73, 0.73] }

# Ceiling (XZ at y=555)
[[rect_xz]]
x = [0.0, 555.0]
z = [0.0, 555.0]
k = 555.0
material = { type = "lambertian", color = [0.73, 0.73, 0.73] }

# Back wall (XY at z=555)
[[rect_xy]]
x = [0.0, 555.0]
y = [0.0, 555.0]
k = 555.0
material = { type = "lambertian", color = [0.73, 0.73, 0.73] }

# Left wall (YZ at x=0) — red
[[rect_yz]]
y = [0.0, 555.0]
z = [0.0, 555.0]
k = 0.0
material = { type = "lambertian", color = [0.65, 0.05, 0.05] }

# Right wall (YZ at x=555) — green
[[rect_yz]]
y = [0.0, 555.0]
z = [0.0, 555.0]
k = 555.0
material = { type = "lambertian", color = [0.12, 0.45, 0.15] }

# Tall box
[[box]]
min = [265.0, 0.0, 295.0]
max = [430.0, 330.0, 460.0]
material = { type = "lambertian", color = [0.73, 0.73, 0.73] }

# Short box
[[box]]
min = [130.0, 0.0, 65.0]
max = [295.0, 165.0, 230.0]
material = { type = "lambertian", color = [0.73, 0.73, 0.73] }
