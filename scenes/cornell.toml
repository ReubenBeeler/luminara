# Cornell Box — classic global illumination test scene
# Uses triangles to form the box walls and two inner blocks

[render]
width = 600
height = 600
samples = 256
max_depth = 50

[camera]
look_from = [278.0, 278.0, -800.0]
look_at = [278.0, 278.0, 0.0]
vfov = 40.0
aperture = 0.0
focus_dist = 1.0

# Light (top, emissive)
[[triangle]]
v0 = [213.0, 554.0, 227.0]
v1 = [343.0, 554.0, 227.0]
v2 = [343.0, 554.0, 332.0]
material = { type = "emissive", color = [1.0, 0.95, 0.85], intensity = 15.0 }

[[triangle]]
