# Gallery scene — showcases all Luminara features
# Spheres, cylinders, boxes, triangles, emissive lights, textures

[render]
width = 960
height = 540
samples = 128
max_depth = 50

[camera]
look_from = [6.0, 3.0, 8.0]
look_at = [0.0, 1.0, 0.0]
vfov = 35.0
aperture = 0.08
focus_dist = 10.0

# Checkerboard ground
[[plane]]
point = [0.0, 0.0, 0.0]
normal = [0.0, 1.0, 0.0]
material = { type = "checker", color1 = [0.95, 0.95, 0.95], color2 = [0.15, 0.15, 0.15], scale = 1.0 }

# Large glass sphere (center)
[[sphere]]
center = [0.0, 1.0, 0.0]
radius = 1.0
material = { type = "dielectric", refraction_index = 1.5 }

# Marble sphere (left)
[[sphere]]
center = [-2.5, 0.8, 0.5]
radius = 0.8
material = { type = "marble", color = [0.85, 0.85, 0.9], scale = 5.0 }

# Polished metal sphere (right)
[[sphere]]
center = [2.5, 0.7, 0.0]
radius = 0.7
material = { type = "metal", color = [0.95, 0.8, 0.6], fuzz = 0.0 }

# Fuzzy metal sphere (far right)
[[sphere]]
center = [4.0, 0.5, -1.0]
radius = 0.5
material = { type = "metal", color = [0.7, 0.7, 0.8], fuzz = 0.3 }

# Turbulent noise sphere (behind glass)
[[sphere]]
center = [-0.5, 0.5, -2.0]
radius = 0.5
material = { type = "turbulence", color = [0.9, 0.6, 0.3], scale = 6.0 }

# Metal cylinder (pillar)
[[cylinder]]
center = [3.5, 0.0, 2.0]
radius = 0.25
height = 2.5
material = { type = "metal", color = [0.85, 0.85, 0.85], fuzz = 0.05 }

# Matte red cylinder
[[cylinder]]
center = [-3.5, 0.0, 1.5]
radius = 0.3
height = 1.5
material = { type = "lambertian", color = [0.7, 0.1, 0.1] }

# White box
[[box]]
min = [1.0, 0.0, -3.0]
max = [2.0, 1.5, -2.0]
material = { type = "lambertian", color = [0.9, 0.9, 0.9] }

# Bright area light (overhead)
[[sphere]]
center = [0.0, 8.0, 0.0]
radius = 2.0
material = { type = "emissive", color = [1.0, 0.98, 0.9], intensity = 6.0 }

# Small accent light (warm)
[[sphere]]
center = [-4.0, 2.0, -2.0]
radius = 0.3
material = { type = "emissive", color = [1.0, 0.6, 0.2], intensity = 12.0 }

# Small accent light (cool)
[[sphere]]
center = [5.0, 1.5, 3.0]
radius = 0.2
material = { type = "emissive", color = [0.4, 0.6, 1.0], intensity = 15.0 }

# Tinted glass sphere (green)
[[sphere]]
center = [-1.0, 0.4, 2.0]
radius = 0.4
material = { type = "dielectric", refraction_index = 1.5, tint = [0.6, 1.0, 0.6] }

# Decorative triangle
[[triangle]]
v0 = [-1.5, 0.0, 3.0]
v1 = [-0.5, 0.0, 3.0]
v2 = [-1.0, 1.5, 3.0]
material = { type = "lambertian", color = [0.2, 0.7, 0.3] }
